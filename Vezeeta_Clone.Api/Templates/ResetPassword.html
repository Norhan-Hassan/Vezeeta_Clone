
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0; padding:20px; font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #C7F9CC 0%, #80ED99 100%);">
    <div style="width:100%; max-width:600px; margin:0 auto; background-color:#FFFFFF; border-radius:16px; box-shadow:0 8px 32px rgba(34, 87, 122, 0.15); overflow:hidden;">

        <div style="background: linear-gradient(135deg, #22577A 0%, #38A3A5 100%); padding:40px 20px; text-align:center;">
            <img src="https://sehatekstorage.blob.core.windows.net/images/Logo.png" alt="Logo" width="80" style="display:block; margin:0 auto 20px; max-width:100%;" />
            <div style="font-size:20px; font-weight:bold;">
                <span style="color:#FFFFFF;">Sehatek.</span><span style="color:#80ED99;">com</span>
            </div>
        </div>

        <div style="padding:40px 20px; background-color:#FFFFFF;">
   
            <div style="margin-bottom:30px;">
                <p style="margin:0; color:#333333; font-size:16px; line-height:1.8; font-weight:500;">
                    {BodyText}
                </p>
            </div>

            <div style="background: linear-gradient(135deg, #F8FFFE 0%, #E8F7F5 100%); border:2px solid #38A3A5; border-radius:12px; padding:30px 20px; margin:30px 0; text-align:center;">             
                <div style="font-size:32px; font-weight:bold; color:#38A3A5; letter-spacing:3px; font-family:'Courier New', monospace; word-break:break-all;">
                    {ResetCode}
                </div>
            </div>

  
            <div style="background-color:#F0F9F8; border-left:4px solid #57CC99; padding:15px; border-radius:8px; margin-bottom:25px;">
                <p style="margin:0; color:#333333; font-size:14px; line-height:1.6;">
                    {EmailFooter}
                </p>
            </div>
        </div>

        <div style="padding:25px 20px; text-align:center; background: linear-gradient(135deg, #F8FFFE 0%, #E8F7F5 100%); border-top:1px solid #C7F9CC;">

            <p style="margin:8px 0 0 0; font-size:11px; color:#80ED99;">
                © 2026 Sehatek.com • Medical Platform
            </p>
        </div>
        <div style="height:1px; background-color:#C7F9CC;"></div>
    </div>
</body>
</html>
